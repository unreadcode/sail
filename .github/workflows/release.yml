name: Release

# 推送 v* 标签时：拉取内核 → 构建 → 打 DMG → 发布到 GitHub Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write       # 创建 Release 需要

jobs:
  build:
    runs-on: macos-26   # macOS 26 + Xcode 26 SDK：链接新 SDK 才有液态玻璃 UI；旧 runner 不行
    steps:
      - uses: actions/checkout@v7

      - name: 选择最新 Xcode
        run: |
          XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          XC="${XC:-/Applications/Xcode.app}"
          echo "使用 $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: 拉取 sing-box 内核
        run: scripts/fetch-kernel.sh

      - name: 打包 DMG
        run: scripts/make-dmg.sh "$PWD/Sail.dmg"

      - name: 发布到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Sail.dmg 给人下载；Sail.app.zip 供 app 内自动更新；源码包 GitHub 自动附带
          files: |
            Sail.dmg
            Sail.app.zip
          generate_release_notes: true
          # 下方安装提示会被「拼在自动变更日志之前」，简短即可；详细说明放 README
          body: |
            下载下方 `Sail.dmg`，拖入「应用程序」后首次打开执行一次：
            ```bash
            xattr -dr com.apple.quarantine /Applications/Sail.app
            ```
            详见 [安装说明](https://github.com/unreadcode/sail#安装)。
