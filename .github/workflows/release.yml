name: Release

# 推送 v* 标签时：拉取内核 → 构建 → 打 DMG → 发布到 GitHub Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write       # 创建 Release 需要

jobs:
  build:
    runs-on: macos-26   # macOS 26 + Xcode 26 SDK：链接新 SDK 才有液态玻璃 UI；旧 runner 不行
    steps:
      - uses: actions/checkout@v7

      - name: 选择最新 Xcode
        run: |
          XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          XC="${XC:-/Applications/Xcode.app}"
          echo "使用 $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: 拉取 sing-box 内核
        run: scripts/fetch-kernel.sh

      - name: 拉取 geo 规则集
        run: scripts/fetch-georules.sh

      - name: 打包 DMG
        run: scripts/make-dmg.sh "$PWD/Sail.dmg"

      # 从 CHANGELOG.md 提取当前 tag 版本的小节作为「更新内容」，写入 RELEASE_BODY.md（末尾以 --- 分隔）。
      # app「设置 › 关于」只展示分隔线 --- 之前的「更新内容」；其后的 GitHub 自动变更日志不在 app 内显示。
      - name: 生成 Release 说明
        run: |
          VER="${GITHUB_REF_NAME#v}"
          SECTION=""
          if [ -f CHANGELOG.md ]; then
            SECTION="$(awk -v h="## $VER" 'index($0,h)==1{f=1;next} /^## /&&f{exit} f{print}' CHANGELOG.md)"
          fi
          {
            if [ -n "$SECTION" ]; then printf '%s\n\n' "$SECTION"; fi
            echo '---'
          } > RELEASE_BODY.md
          [ -n "$SECTION" ] || echo "::warning::CHANGELOG.md 缺少 ## $VER 小节，本次 Release 无更新日志"
          echo '----- RELEASE_BODY.md -----'; cat RELEASE_BODY.md

      - name: 发布到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          # Sail.dmg 给人下载；Sail.app.zip 供 app 内自动更新；源码包 GitHub 自动附带
          files: |
            Sail.dmg
            Sail.app.zip
          # body_path 内容会被「拼在 GitHub 自动变更日志之前」
          generate_release_notes: true
          body_path: RELEASE_BODY.md
